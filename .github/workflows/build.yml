name: SonarQube
on:
  push:
    branches: [ master ]

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'zulu'

      - name: Download SonarQube Scanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-4.8.0.2851-linux.zip
          unzip -q sonar-scanner-cli-4.8.0.2851-linux.zip
          chmod +x sonar-scanner-4.8.0.2851-linux/bin/sonar-scanner

      - name: Run SonarQube Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: qingquan11_xiaominotes
          SONAR_ORGANIZATION: qingquan11
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_SOURCES: src
          SONAR_JAVA_BINARIES: bin
          SONAR_JAVA_SOURCE: 1.8
        run: |
          sonar-scanner-4.8.0.2851-linux/bin/sonar-scanner \
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=${{ env.SONAR_HOST_URL }} \
            -Dsonar.sources=${{ env.SONAR_SOURCES }} \
            -Dsonar.java.binaries=${{ env.SONAR_JAVA_BINARIES }} \
            -Dsonar.java.source=${{ env.SONAR_JAVA_SOURCE }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
