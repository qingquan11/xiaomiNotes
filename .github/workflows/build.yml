name: SonarQube Scan
on:
  push:
    branches: [ master ]

jobs:
  sonar-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube必须拉取完整Git历史

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'zulu'

      - name: Install SonarQube Scanner
        run: |
          # 下载SonarQube官方扫描器
          wget -q https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip -q sonar-scanner-cli-5.0.1.3006-linux.zip
          chmod +x sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner

      - name: Run SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 直接用SonarQube扫描器，完全不依赖Gradle
          sonar-scanner-5.0.1.3006-linux/bin/sonar-scanner \
            -Dsonar.projectKey=qingquan11_xiaominotes \
            -Dsonar.organization=qingquan11 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=src \
            -Dsonar.java.binaries=bin \
            -Dsonar.java.source=1.8 \
            -Dsonar.java.target=1.8 \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
