// 为老 Ant 项目创建的 Gradle 配置，用于 SonarQube 分析
plugins {
    id "org.sonarqube" version "7.2.3.7755"
    id "java"
}

// 配置项目信息，和 SonarCloud 对应
sonar {
    properties {
        property 'sonar.projectKey', 'qingquan11_xiaominotes'
        property 'sonar.organization', 'qingquan11'
        property 'sonar.host.url', 'https://sonarcloud.io'
        // 配置 Java 源码路径
        property 'sonar.sources', 'src'
        property 'sonar.java.binaries', 'bin'
        property 'sonar.java.source', '1.8'
        property 'sonar.java.target', '1.8'
    }
}

// 配置仓库，用于下载 SonarQube 插件
repositories {
    mavenCentral()
    google()
}
